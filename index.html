let currentFilter = '全部';

function renderJobs() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const grid = document.getElementById('jobsGrid');
  const noResults = document.getElementById('noResults');
  
  const filtered = jobs.filter(job => {
    const matchCity = currentFilter === '全部' || job.city === currentFilter;
    const matchSearch = !search || 
      job.title.toLowerCase().includes(search) ||
      job.city.toLowerCase().includes(search) ||
      job.source.toLowerCase().includes(search);
    return matchCity && matchSearch;
  });

  if (filtered.length === 0) {
    grid.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }
  
  noResults.style.display = 'none';
  grid.innerHTML = filtered.map(job => `
    <div class="job-card" onclick="window.open('${job.url}', '_blank')">
      <span class="city city-${job.city}">${job.city}</span>
      <h3>${job.title}</h3>
      <div class="meta">
        <span class="source">📍 ${job.source}</span>
        ${job.date ? `<span class="date">📅 ${job.date}</span>` : ''}
      </div>
    </div>
  `).join('');
}

function updateStats() {
  document.getElementById('totalCount').textContent = jobs.length;
  const cities = [...new Set(jobs.map(j => j.city))];
  document.getElementById('cityCount').textContent = cities.length;
  const dates = jobs.map(j => j.date).filter(d => d).sort().reverse();
  document.getElementById('latestDate').textContent = dates.length ? dates[0] : '-';
}

document.getElementById('searchInput').addEventListener('input', renderJobs);

document.getElementById('filters').addEventListener('click', (e) => {
  if (e.target.classList.contains('filter-btn')) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    currentFilter = e.target.dataset.city;
    renderJobs();
  }
});

updateStats();
renderJobs();
</script>
